<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.svg">
  <title>Bifröst — Travel Planner</title>

  <!-- Firebase SDK (compat mode — no build step needed) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <!-- App Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     SIGN-IN GATE
═══════════════════════════════════════════════════════════ -->
<div id="auth-gate">
  <div class="auth-card">
    <div class="auth-logo">✦</div>
    <div class="auth-title">Bifröst</div>
    <div class="auth-subtitle">The bridge between destinations</div>
    <div id="g-signin-btn"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════════════════════ -->
<div id="app" style="display:none">

  <!-- ─── Header ───────────────────────────────────────── -->
  <header id="app-header">
    <div class="header-logo">✦</div>
    <div>
      <div class="header-title">Bifröst</div>
      <div class="header-subtitle">Loading...</div>
    </div>
    <div class="header-spacer"></div>
  </header>

  <!-- ─── Main content area ────────────────────────────── -->
  <div id="main-content">

    <!-- ═══════════════════════════════════════
         DESKTOP SIDEBAR
    ═══════════════════════════════════════ -->
    <aside id="sidebar">
      <!-- Populated programmatically — shared with bottom sheet -->
    </aside>

    <!-- ═══════════════════════════════════════
         MAP
    ═══════════════════════════════════════ -->
    <div id="map-container">
      <div id="map"></div>

      <!-- ─── Layer Controls (floating) ──────── -->
      <div id="layer-controls">
        <button id="layer-btn" title="Map layers &amp; filters" aria-label="Map layers and filters">🗂️</button>

        <div id="layer-panel">

          <!-- Source toggles -->
          <div class="layer-panel-section">
            <div class="layer-panel-title">Show Places</div>
            <label class="layer-toggle">
              <input type="checkbox" id="toggle-my-pois" checked
                onchange="App.toggleLayer('showUser', this.checked)">
              <span class="toggle-track"></span>
              <span class="toggle-label">📌 My POIs</span>
            </label>
            <label class="layer-toggle">
              <input type="checkbox" id="toggle-nearby" checked
                onchange="App.toggleDiscoverLayer('nearby', this.checked)">
              <span class="toggle-track"></span>
              <span class="toggle-label">📍 Near accommodation</span>
            </label>
            <label class="layer-toggle">
              <input type="checkbox" id="toggle-along-route"
                onchange="App.toggleDiscoverLayer('route', this.checked)">
              <span class="toggle-track"></span>
              <span class="toggle-label">🛣️ Along route</span>
            </label>
            <label class="layer-toggle">
              <input type="checkbox" id="toggle-all-days"
                onchange="App.toggleLayer('showAllDays', this.checked)">
              <span class="toggle-track"></span>
              <span class="toggle-label">🗓️ All Days</span>
            </label>
          </div>

          <!-- Category filters -->
          <div class="layer-panel-section">
            <div class="layer-panel-title">Categories</div>
            <div class="category-filters" id="category-filters">
              <!-- Populated by JS -->
            </div>
          </div>

          <!-- Map style -->
          <div class="layer-panel-section">
            <div class="layer-panel-title">Map Style</div>
            <div class="route-mode-group">
              <button class="route-mode-btn active" data-style="map"
                onclick="App.setMapStyle('map')">🗺️ Map</button>
              <button class="route-mode-btn" data-style="satellite"
                onclick="App.setMapStyle('satellite')">🛰️ Satellite</button>
            </div>
          </div>

          <!-- Weather overlays -->
          <div class="layer-panel-section">
            <div class="layer-panel-title">Weather Overlay</div>
            <label class="layer-toggle">
              <input type="checkbox" id="toggle-rain"
                onchange="App.toggleWeatherOverlay('rain', this.checked)">
              <span class="toggle-track"></span>
              <span class="toggle-label">🌧️ Rain</span>
            </label>
            <label class="layer-toggle">
              <input type="checkbox" id="toggle-clouds"
                onchange="App.toggleWeatherOverlay('clouds', this.checked)">
              <span class="toggle-track"></span>
              <span class="toggle-label">☁️ Clouds</span>
            </label>
            <label class="layer-toggle">
              <input type="checkbox" id="toggle-temp"
                onchange="App.toggleWeatherOverlay('temp', this.checked)">
              <span class="toggle-track"></span>
              <span class="toggle-label">🌡️ Temperature</span>
            </label>
          </div>

        </div><!-- /layer-panel -->
      </div><!-- /layer-controls -->

    </div><!-- /map-container -->

  </div><!-- /main-content -->

</div><!-- /app -->

<!-- ═══════════════════════════════════════════════════════════
     MOBILE BOTTOM SHEET
     (sits outside #app to overlay the map)
═══════════════════════════════════════════════════════════ -->
<div id="bottom-sheet" class="collapsed">
  <div class="bottom-sheet-handle" id="sheet-handle">
    <div class="handle-bar"></div>
  </div>
  <!-- Bottom sheet inner content is rendered into this container -->
  <div id="bottom-sheet-inner">
    <!-- Populated by JS (shares same render functions as sidebar) -->
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     POI DETAIL PANEL
═══════════════════════════════════════════════════════════ -->
<div id="poi-detail">
  <!-- Populated dynamically by JS -->
</div>

<!-- ═══════════════════════════════════════════════════════════
     TRIP SELECTOR MODAL
═══════════════════════════════════════════════════════════ -->
<div id="trip-selector" class="hidden">
  <div class="trip-selector-panel">
    <div class="trip-selector-title">✦ Choose a Trip</div>
    <div class="trip-selector-subtitle">Select a trip to start planning</div>
    <div class="trip-cards" id="trip-cards">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     TOAST NOTIFICATIONS
═══════════════════════════════════════════════════════════ -->
<div id="toast-container"></div>

<!-- ═══════════════════════════════════════════════════════════
     SCRIPTS
     Order: Leaflet → Trip Registry → Trip Files → App
═══════════════════════════════════════════════════════════ -->

<!-- Define trip registry synchronously — MUST be before any trip data files -->
<script>
  window._tripRegistry = [];
  window.registerTrip = function(data) { window._tripRegistry.push(data); };
</script>

<!-- Leaflet (synchronous — app.js needs it available at parse time) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- LZ-String: lightweight compression for URL-based plan sharing -->
<script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>

<!-- Trip data files (synchronous — populate window._tripRegistry) -->
<script src="trips/seville-2026.js?v=38"></script>

<!-- App logic: defer ensures it runs AFTER all synchronous scripts above
     have fully executed, so window._tripRegistry is always populated -->
<script src="config.js"></script>
<script src="app.js?v=46" defer></script>

</body>
</html>
