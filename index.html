<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>TripCraft — Travel Planner</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <!-- App Styles -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     APP SHELL
═══════════════════════════════════════════════════════════ -->
<div id="app">

  <!-- ─── Header ───────────────────────────────────────── -->
  <header id="app-header">
    <div class="header-logo">✈️</div>
    <div>
      <div class="header-title">TripCraft</div>
      <div class="header-subtitle">Loading...</div>
    </div>
    <div class="header-spacer"></div>
    <button id="btn-reset-plan" onclick="App.resetPlan()" title="Reset to default plan">
      ↺ Reset
    </button>
  </header>

  <!-- ─── Main content area ────────────────────────────── -->
  <div id="main-content">

    <!-- ═══════════════════════════════════════
         DESKTOP SIDEBAR
    ═══════════════════════════════════════ -->
    <aside id="sidebar">
      <!-- Populated programmatically — shared with bottom sheet -->
    </aside>

    <!-- ═══════════════════════════════════════
         MAP
    ═══════════════════════════════════════ -->
    <div id="map-container">
      <div id="map"></div>

      <!-- ─── Layer Controls (floating) ──────── -->
      <div id="layer-controls">
        <button id="layer-btn" title="Map layers &amp; filters">🗂️</button>

        <div id="layer-panel">

          <!-- Source toggles -->
          <div class="layer-panel-section">
            <div class="layer-panel-title">Show Places</div>
            <label class="layer-toggle">
              <input type="checkbox" id="toggle-my-pois" checked
                onchange="App.toggleLayer('showUser', this.checked)">
              <span class="toggle-track"></span>
              <span class="toggle-label">📌 My POIs</span>
            </label>
            <label class="layer-toggle">
              <input type="checkbox" id="toggle-suggested" checked
                onchange="App.toggleLayer('showSuggested', this.checked)">
              <span class="toggle-track"></span>
              <span class="toggle-label">💡 Suggested</span>
            </label>
            <label class="layer-toggle">
              <input type="checkbox" id="toggle-all-days"
                onchange="App.toggleLayer('showAllDays', this.checked)">
              <span class="toggle-track"></span>
              <span class="toggle-label">🗓️ All Days</span>
            </label>
          </div>

          <!-- Route mode -->
          <div class="layer-panel-section">
            <div class="layer-panel-title">Route Mode</div>
            <div class="route-mode-group">
              <button class="route-mode-btn active" data-mode="foot"
                onclick="App.setRouteMode('foot')">🚶 Walk</button>
              <button class="route-mode-btn" data-mode="driving"
                onclick="App.setRouteMode('driving')">🚗 Drive</button>
            </div>
          </div>

          <!-- Category filters -->
          <div class="layer-panel-section">
            <div class="layer-panel-title">Categories</div>
            <div class="category-filters" id="category-filters">
              <!-- Populated by JS -->
            </div>
          </div>

        </div><!-- /layer-panel -->
      </div><!-- /layer-controls -->

    </div><!-- /map-container -->

  </div><!-- /main-content -->

</div><!-- /app -->

<!-- ═══════════════════════════════════════════════════════════
     MOBILE BOTTOM SHEET
     (sits outside #app to overlay the map)
═══════════════════════════════════════════════════════════ -->
<div id="bottom-sheet" class="collapsed">
  <div class="bottom-sheet-handle" id="sheet-handle">
    <div class="handle-bar"></div>
  </div>
  <!-- Bottom sheet inner content is rendered into this container -->
  <div id="bottom-sheet-inner">
    <!-- Populated by JS (shares same render functions as sidebar) -->
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     POI DETAIL PANEL
═══════════════════════════════════════════════════════════ -->
<div id="poi-detail">
  <!-- Populated dynamically by JS -->
</div>

<!-- ═══════════════════════════════════════════════════════════
     TRIP SELECTOR MODAL
═══════════════════════════════════════════════════════════ -->
<div id="trip-selector" class="hidden">
  <div class="trip-selector-panel">
    <div class="trip-selector-title">✈️ Choose a Trip</div>
    <div class="trip-selector-subtitle">Select a trip to start planning</div>
    <div class="trip-cards" id="trip-cards">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     TOAST NOTIFICATIONS
═══════════════════════════════════════════════════════════ -->
<div id="toast-container"></div>

<!-- ═══════════════════════════════════════════════════════════
     SCRIPTS
     Order: Leaflet → Trip Registry → Trip Files → App
═══════════════════════════════════════════════════════════ -->

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/WLEo=" crossorigin=""></script>

<!-- Trip registry index -->
<script src="trips/index.js"></script>

<!-- Trip data -->
<script src="trips/seville-2026.js"></script>

<!-- Main app logic -->
<script src="app.js"></script>

</body>
</html>
